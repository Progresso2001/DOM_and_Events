<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos de teclado </title>
</head>
<body>
    <!-- <button id="entrar" style="width: 100% ;height: 100%; padding: 20px; margin: 20px; background-color: blue;">Entrar</button> -->
    <script>
        // usando o kewdown
        document.addEventListener('keydown', function(event){
            if (event.key === 'Enter'){
                console.log('Pressionado o enter')
            }
            if (event.key === 'Escape'){
                console.log('ESC pressionado')
            }
        })
        //usando o keyup
        document.addEventListener('keyup', function(e){
            if (e.key === 'Enter'){
                console.log('Soltou o enter');
                
            }
        })
    </script>
</body>
</html>
